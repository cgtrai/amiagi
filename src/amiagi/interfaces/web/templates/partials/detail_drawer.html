{# ── Detail Drawer — 400px slide-in panel (right) ─────────── #}

{# Overlay backdrop #}
<div class="detail-drawer-overlay" id="drawer-overlay"></div>

{# Drawer panel #}
<aside class="detail-drawer app-drawer" id="detail-drawer" role="complementary" aria-label="{{ _('drawer.title') }}">
  <div class="detail-drawer-header">
    <h3 id="drawer-title">{{ _("drawer.details") }}</h3>
    <button class="detail-drawer-close" onclick="closeDetailDrawer()" aria-label="{{ _('common.close') }}">✕</button>
  </div>
  <div class="detail-drawer-body" id="drawer-body">
    {% block drawer_content %}
    {# Page-specific drawer content injected here #}
    {% endblock %}
  </div>
</aside>

<script>
/* ── Drawer open / close helpers ─────────────────────────────── */
function openDetailDrawer(title, htmlContent) {
  var drawer  = document.getElementById('detail-drawer');
  var overlay = document.getElementById('drawer-overlay');
  var shell   = document.querySelector('.app-shell');

  if (title) {
    document.getElementById('drawer-title').textContent = title;
  }
  if (htmlContent) {
    document.getElementById('drawer-body').innerHTML = htmlContent;
  }

  drawer.classList.add('open');
  overlay.classList.add('active');
  if (shell) shell.classList.add('drawer-open');
}

function closeDetailDrawer() {
  var drawer  = document.getElementById('detail-drawer');
  var overlay = document.getElementById('drawer-overlay');
  var shell   = document.querySelector('.app-shell');

  drawer.classList.remove('open');
  drawer.classList.remove('detail-drawer--wide');
  drawer.style.width = '';
  overlay.classList.remove('active');
  if (shell) {
    shell.classList.remove('drawer-open');
    shell.classList.remove('drawer-wide');
  }
}

function isDetailDrawerOpen() {
  var drawer = document.getElementById('detail-drawer');
  return !!(drawer && drawer.classList.contains('open'));
}

/* Close drawer on Escape */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var drawer = document.getElementById('detail-drawer');
    if (drawer && drawer.classList.contains('open')) {
      closeDetailDrawer();
    }
  }
});

(function attachDetailDrawerEvents() {
  var drawer = document.getElementById('detail-drawer');
  var overlay = document.getElementById('drawer-overlay');
  if (!drawer || !overlay) {
    return;
  }

  drawer.addEventListener('click', function (e) {
    e.stopPropagation();
  });

  drawer.addEventListener('mousedown', function (e) {
    e.stopPropagation();
  });

  function closeOnOutsidePointer(e) {
    if (!isDetailDrawerOpen()) {
      return;
    }
    if (drawer.contains(e.target)) {
      return;
    }
    e.preventDefault();
    e.stopPropagation();
    if (typeof e.stopImmediatePropagation === 'function') {
      e.stopImmediatePropagation();
    }
    closeDetailDrawer();
  }

  overlay.addEventListener('click', function (e) {
    if (e.target === overlay && isDetailDrawerOpen()) {
      closeDetailDrawer();
    }
  });

  document.addEventListener('mousedown', closeOnOutsidePointer, true);
  document.addEventListener('touchstart', closeOnOutsidePointer, true);
})();
</script>
