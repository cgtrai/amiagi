<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>{% block title %}Amiagi{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/tokens.css"/>
  <link rel="stylesheet" href="/static/css/components.css"/>
  <link rel="stylesheet" href="/static/css/layout.css"/>
  <link rel="stylesheet" href="/static/css/responsive.css"/>
  {% block head %}{% endblock %}
</head>
<body class="{% block body_class %}{% endblock %}">
  <div class="app-shell" id="app-shell">

    {% include "partials/nav.html" %}
    {% include "partials/command_rail.html" %}

    <main class="app-main">
      {% block content %}{% endblock %}
    </main>

    {% include "partials/detail_drawer.html" %}

  </div>

  {% include "partials/status_bar.html" %}

  <!-- Web Components -->
  <script src="/static/js/components/global-search.js" defer></script>
  <script src="/static/js/components/session-timeline.js" defer></script>
  <script src="/static/js/components/performance-chart.js" defer></script>
  <script src="/static/js/status_bar.js" defer></script>
  <global-search></global-search>

  {% include "partials/toast.html" %}

  <!-- Service Worker registration (Web Push) -->
  <script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/static/sw.js').catch(function(){});
  }
  </script>

  <!-- i18n runtime for vanilla-JS components -->
  <script>
  window._i18n = {{ translations_json|safe }};
  window.t = function(key, fallback) { return window._i18n[key] || fallback || key; };
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
